server {
    listen PORT_PLACEHOLDER;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak internal port or force http in Location header
    port_in_redirect off;
    absolute_redirect off;

    # SEO consolidation redirects (2026-04-17) — eliminate 100% duplicate content
    location = /criminal-defense.html { return 301 https://faq.rrklawoffice.com/assault-faq.html; }
    location = /divorce.html         { return 301 https://faq.rrklawoffice.com/divorce-faq.html; }
    location = /family-law.html      { return 301 https://faq.rrklawoffice.com/family-law-faq.html; }
    location = /personal-injury.html { return 301 https://faq.rrklawoffice.com/car-accident-faq.html; }

    location / {
        try_files $uri $uri/ =404;
    }
}

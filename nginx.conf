server {
    listen PORT_PLACEHOLDER;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SEO consolidation redirects (2026-04-17) — eliminate 100% duplicate content
    location = /criminal-defense.html { return 301 /assault-faq.html; }
    location = /divorce.html         { return 301 /divorce-faq.html; }
    location = /family-law.html      { return 301 /family-law-faq.html; }
    location = /personal-injury.html { return 301 /car-accident-faq.html; }

    location / {
        try_files $uri $uri/ =404;
    }
}

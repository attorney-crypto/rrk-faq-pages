<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRK Law FAQ Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('rrk-law-building.png') no-repeat center center fixed;
            background-size: cover;
            color: #F0F0F0;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.85);
            z-index: -1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #D4AF37;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #D4AF37;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        .faq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .faq-card {
            background-color: #555759;
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: #F0F0F0;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .faq-card:hover {
            border-color: #D4AF37;
            transform: translateY(-5px);
        }
        .faq-card h2 {
            color: #D4AF37;
            margin-top: 0;
            font-size: 1.5em;
        }
        .faq-card p {
            margin-bottom: 0;
            color: #c0c0c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RRK LAW</h1>
        <div class="subtitle">Frequently Asked Questions</div>

        <div class="faq-grid">
            <a href="/divorce.html" class="faq-card">
                <h2>Divorce</h2>
                <p>Texas divorce law, community property, alimony, and more</p>
            </a>

            <a href="/personal-injury.html" class="faq-card">
                <h2>Personal Injury</h2>
                <p>Car accidents, claims, settlements</p>
            </a>

            <a href="/criminal-defense.html" class="faq-card">
                <h2>Criminal Defense</h2>
                <p>Drug charges, DWI, assault, and more</p>
            </a>

            <a href="/family-law.html" class="faq-card">
                <h2>Family Law</h2>
                <p>Child custody, modifications, enforcement</p>
            </a>
        </div>
    </div>
</body>
</html>

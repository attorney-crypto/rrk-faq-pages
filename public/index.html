<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRK Law FAQ Hub</title>
    <link rel="canonical" href="https://faq.rrklawoffice.com/">
    <style>
        :root {
            --bg-charcoal: #2d2b2a;
            --card-slate: #555759;
            --card-slate-top: #5a5d60;
            --card-slate-bottom: #4f5254;
            --border-ink: #1b1b1a;
            --text-silver: #e8e8e8;
            --text-muted: #a1a2a2;
            --btn-fill: #bdbdbd;
            --btn-text: #111111;
            --icon-silver: #c7c7c7;
        }
        body {
            font-family: Arial, sans-serif;
            background: url('rrk-law-building.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-silver);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 43, 42, 0.65);
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: var(--text-silver);
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
        }
        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .faq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }
        .faq-card {
            background: linear-gradient(180deg, var(--card-slate-top) 0%, var(--card-slate-bottom) 100%);
            padding: 28px;
            border-radius: 14px;
            border: 1px solid var(--border-ink);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: var(--text-silver);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .faq-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .faq-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }
        .faq-card-icon {
            font-size: 40px;
            color: var(--icon-silver);
            line-height: 1;
        }
        .faq-card h2 {
            color: var(--text-silver);
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .faq-card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 17px;
            font-weight: 400;
            line-height: 1.5;
        }
        .view-all-btn {
            background-color: var(--btn-fill);
            color: var(--btn-text);
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            transition: all 0.3s;
        }
        .view-all-btn:hover {
            background-color: #a8a8a8;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RRK LAW</h1>
        <div class="subtitle">Frequently Asked Questions</div>

        <div class="faq-grid">
            <a href="/family-law-topics.html" class="faq-card">
                <div class="faq-card-header">
                    <span class="faq-card-icon">🏛</span>
                    <h2>Family Law</h2>
                </div>
                <p>Divorce, child custody, child support, and more</p>
            </a>

            <a href="/personal-injury-topics.html" class="faq-card">
                <div class="faq-card-header">
                    <span class="faq-card-icon">🛡</span>
                    <h2>Personal Injury</h2>
                </div>
                <p>Car accidents, truck accidents, slip & fall, dog bites, and more</p>
            </a>

            <a href="/criminal-defense-topics.html" class="faq-card">
                <div class="faq-card-header">
                    <span class="faq-card-icon">⚖</span>
                    <h2>Criminal Defense</h2>
                </div>
                <p>Assault, DWI, drug possession, and more</p>
            </a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Defense FAQ Topics | RRK Law Office</title>
    <link rel="canonical" href="https://faq.rrklawoffice.com/criminal-defense-topics.html">
    <style>
        :root {
            --bg-charcoal: #2d2b2a;
            --card-slate: #555759;
            --card-slate-top: #5a5d60;
            --card-slate-bottom: #4f5254;
            --border-ink: #1b1b1a;
            --text-silver: #e8e8e8;
            --text-muted: #a1a2a2;
            --btn-fill: #bdbdbd;
            --btn-text: #111111;
            --icon-silver: #c7c7c7;
        }
        body {
            font-family: Arial, sans-serif;
            background: url('rrk-law-building.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-silver);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 43, 42, 0.65);
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .back-btn {
            display: inline-block;
            background-color: var(--btn-fill);
            color: var(--btn-text);
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 30px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background-color: #a8a8a8;
            transform: translateY(-1px);
        }
        h1 {
            color: var(--text-silver);
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .category-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .category-icon {
            font-size: 60px;
            color: var(--icon-silver);
        }
        .faq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .faq-card {
            background: linear-gradient(180deg, var(--card-slate-top) 0%, var(--card-slate-bottom) 100%);
            padding: 28px;
            border-radius: 14px;
            border: 1px solid var(--border-ink);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: var(--text-silver);
            transition: all 0.3s ease;
            display: block;
        }
        .faq-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .faq-card h2 {
            color: var(--text-silver);
            margin: 0 0 12px 0;
            font-size: 24px;
            font-weight: 700;
        }
        .faq-card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/index.html" class="back-btn">← Back to Main</a>

        <div class="category-header">
            <span class="category-icon">⚖</span>
            <h1>Criminal Defense</h1>
        </div>
        <div class="subtitle">Select a topic to view frequently asked questions</div>

        <div class="faq-grid">
            <a href="/assault-faq.html" class="faq-card">
                <h2>Assault</h2>
                <p>Simple assault, aggravated assault, family violence, penalties</p>
            </a>

            <a href="/dwi-faq.html" class="faq-card">
                <h2>DWI</h2>
                <p>DWI charges, ALR hearings, penalties, license suspension</p>
            </a>

            <a href="/drug-possession-faq.html" class="faq-card">
                <h2>Drug Possession</h2>
                <p>POCS charges, penalty groups, possession vs. delivery</p>
            </a>
        </div>
    </div>
</body>
</html>
